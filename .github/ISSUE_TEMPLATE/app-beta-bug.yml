name: Report a problem
description: Report an install, launch, workspace, agent, or update problem in SPIN.
title: "[bug] "
labels: ["app", "beta"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include provider keys, private repository contents, credentials, or proprietary prompts.
  - type: input
    id: version
    attributes:
      label: SPIN version
      description: Find the version on the release page or in the app health output.
      placeholder: v4.1.0-beta.3
    validations:
      required: true
  - type: dropdown
    id: install_path
    attributes:
      label: Install path
      options:
        - SPIN for Mac DMG
        - Source / CLI checkout
        - Local development build
        - Other
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: System
      description: macOS or Linux version plus architecture.
      placeholder: macOS 15.x, Apple Silicon
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Install / Gatekeeper
        - First launch / onboarding
        - Navigator
        - Project workspace
        - OMP setup / model routing
        - App health
        - App update
        - Release artifact
        - Other
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Downloaded the DMG from ...
        2. Dragged SPIN.app to Applications
        3. Opened SPIN
        4. Saw ...
    validations:
      required: true
  - type: textarea
    id: health
    attributes:
      label: Health output
      description: Paste `spin app-health` output if available. Remove secrets and private paths first.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add logs or screenshots if they help. Do not include secrets.
