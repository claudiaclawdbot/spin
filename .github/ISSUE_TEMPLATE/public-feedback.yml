name: Product feedback
description: Share feedback about SPIN's workflow, usability, documentation, or reliability.
title: "[feedback] "
labels: ["feedback", "beta"]
body:
  - type: markdown
    attributes:
      value: |
        Share what worked, what was unclear, and what would make SPIN more useful. Do not include credentials or private project content.
  - type: dropdown
    id: perspective
    attributes:
      label: Your perspective
      options:
        - Used SPIN for Mac
        - Used the source / CLI install
        - Reviewed the website or docs
        - Reviewed the source code
        - Other
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Feedback area
      options:
        - First impression
        - Onboarding
        - Navigator and project workspaces
        - Delegation and progress tracking
        - OMP / model routing
        - Approvals and safety controls
        - Installation and updates
        - Documentation
        - Reliability and performance
        - Other
    validations:
      required: true
  - type: textarea
    id: clear
    attributes:
      label: What was clear?
  - type: textarea
    id: confusing
    attributes:
      label: What was confusing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: What would improve SPIN?
  - type: textarea
    id: audience
    attributes:
      label: What kind of work were you trying to run?
      description: Include the number and type of projects, but omit private repository details.
