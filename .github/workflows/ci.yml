name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  syntax:
    name: syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n every script
        run: |
          set -e
          for f in scripts/*.sh scripts/lib/*.sh install.sh spin-bootstrap.sh; do
            bash -n "$f"
            echo "ok: $f"
          done
      - name: node --check the node scripts
        run: |
          node --check scripts/ceo-dashboard.js
          node --check scripts/org
      - name: validate shipped JSON
        run: |
          set -e
          for f in org/OMP_HARNESS.example.json org/projects/example-app/STATE.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
            echo "ok: $f"
          done

  install-smoke:
    name: install.sh smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run installer (no agent CLIs in CI)
        run: SPIN_NO_DEPS=1 SPIN_INSTALL_SKIP_AGENT_CHECK=1 ./install.sh
      - name: assert runtime files exist
        run: |
          set -e
          for f in org/ceo/APPROVALS.md org/ceo/INBOX.md org/HUMAN_QUEUE.md \
                   org/AGENT_QUEUE.json org/state.json org/OMP_HARNESS.json \
                   org/ceo/WORKSPACE_CONTROLLER_PROMPT.md; do
            test -f "$f" && echo "ok: $f"
          done
      - name: bootstrap a project
        run: |
          bash scripts/bootstrap-project.sh smoke-test-app
          test -f org/projects/smoke-test-app/PROJECT_CONTROLLER_PROMPT.md
          test -f org/projects/smoke-test-app/STATE.json
      - name: org CLI — validation + queue a job
        run: |
          set -e
          # register smoke-test-app in the harness so queue-job accepts it
          node -e 'const f="org/OMP_HARNESS.json";const h=JSON.parse(require("fs").readFileSync(f));h.projects["smoke-test-app"]={allowed_job_types:["scout"]};require("fs").writeFileSync(f,JSON.stringify(h,null,2))'
          node scripts/org queue-job smoke-test-app scout "ci smoke job"
          # unknown project must be rejected (exit 2)
          if node scripts/org queue-job ghost scout "nope" 2>/dev/null; then echo "FAIL: bad project accepted"; exit 1; fi
          # disallowed type must be rejected
          if node scripts/org queue-job smoke-test-app banana "nope" 2>/dev/null; then echo "FAIL: bad type accepted"; exit 1; fi
          node scripts/org show
      - name: commands work when invoked via the ~/.local/bin symlink
        run: |
          set -e
          # install.sh linked spin+org into ~/.local/bin as symlinks; running them
          # that way must resolve ROOT to the repo, not ~/.local (regression guard).
          out="$("$HOME/.local/bin/org" show 2>&1)"
          echo "$out" | grep -q "$(pwd)" || { echo "FAIL: org via symlink resolved wrong ROOT: $out"; exit 1; }
          "$HOME/.local/bin/spin" help >/dev/null
          echo "ok: spin + org resolve correctly through the symlink"
      - name: dispatcher runs clean on the queue
        run: bash scripts/omp-supervisor-once.sh
      - name: full local smoke suite
        run: bash scripts/smoke-test.sh
      - name: installer is idempotent
        run: SPIN_NO_DEPS=1 SPIN_INSTALL_SKIP_AGENT_CHECK=1 ./install.sh

  installers:
    name: launcher + offline installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: offline self-extractor installs (no network)
        run: |
          set -e
          # rebuild from source (committed copy is platform-built; tar mtimes make
          # cross-OS byte-equality impossible, so we test the fresh build)
          bash scripts/build-bootstrap.sh
          SPIN_NO_DEPS=1 SPIN_INSTALL_SKIP_AGENT_CHECK=1 bash spin-offline.sh "$RUNNER_TEMP/spin-offline"
          test -f "$RUNNER_TEMP/spin-offline/scripts/org"
          test -f "$RUNNER_TEMP/spin-offline/org/state.json"
          echo "ok: offline self-extract installed"
      - name: launcher pipes cleanly (curl|bash) and clones
        run: |
          set -e
          # feed the launcher through a pipe like curl|bash; it clones this repo + installs
          cat spin-bootstrap.sh | SPIN_NO_DEPS=1 SPIN_INSTALL_SKIP_AGENT_CHECK=1 bash -s -- "$RUNNER_TEMP/spin-piped"
          test -f "$RUNNER_TEMP/spin-piped/scripts/spin"
          echo "ok: piped launcher cloned + installed"

  shellcheck:
    name: shellcheck (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (errors only)
        run: |
          sudo apt-get install -y shellcheck >/dev/null
          shellcheck --severity=error scripts/*.sh scripts/lib/*.sh install.sh
